# Cloudflare Workers configuration for wielegroup.com
#
# Adapter: @opennextjs/cloudflare (Cloudflare's recommended adapter for
# Next 14+, replaces @cloudflare/next-on-pages which peer-locks to Next
# ≤15.5.2 and doesn't support Next 16).
#
# Build pipeline:
#   1. npm run build                       → Next.js produces .next/
#   2. npx @opennextjs/cloudflare build   → adapter compiles to .open-next/
#   3. npx wrangler deploy                 → ships to Cloudflare Workers
#
# KV namespace IDs are populated in the Cloudflare dashboard
# (Workers & Pages → Settings → KV → Bindings) — don't commit them
# here, they're per-account references.
#
# DEPLOY.md (this branch) carries the full 9-gate post-deploy checklist.

name = "wielegroup-com"
main = ".open-next/worker.js"
compatibility_date = "2026-05-03"
compatibility_flags = ["nodejs_compat"]
workers_dev = true  # keep workers.dev URL for staging/smoke tests

# Phase 7.4 fix (2026-05-03): custom-domain attachment removed from
# wrangler.toml. The `custom_domain = true` form re-tries the API attach
# on every `wrangler deploy`, which fails with 100117 because wrangler's
# OAuth token doesn't carry `dns_records:edit` scope (can't override
# the pre-existing apex DNS records).
#
# The actual route bindings exist as ZONE-LEVEL Workers Routes, created
# via direct Cloudflare API in Phase 7.3:
#   - id adc46344204840c096811f4d480b5dbb (wielegroup.com/* → wielegroup-com)
#   - id 2baac90afb3c4ef99cd30ba5c8fe7eb4 (www.wielegroup.com/* → wielegroup-com)
# These are managed via the dashboard / Workers Routes API, not here.
# `wrangler deploy` ships the Worker code; routing is preserved.
#
# When/if Cloudflare expands the wrangler OAuth scope to include DNS
# write, the `routes = [{ pattern, custom_domain = true }]` block can be
# re-added (and the zone-level routes deleted) for cleaner config.

[assets]
binding = "ASSETS"
directory = ".open-next/assets"

# Audit queue KV — production binding.
[[kv_namespaces]]
binding = "AUDIT_QUEUE"
id = "4f4aeab739c247268c6a6c7cc9d91c1f"

# Preview deployment KV — uncomment + set ID when preview branches are wired.
# [[env.preview.kv_namespaces]]
# binding = "AUDIT_QUEUE"
# id = "<preview-namespace-id>"

# Environment variables.
#
# SERVER-ONLY SECRETS (set via `npx wrangler secret put NAME`, runtime-injected):
#   WIELE_AI_API_KEY              (real-mode only)
#   RESEND_API_KEY                ✅ set 2026-05-03
#   TURNSTILE_SECRET_KEY          ✅ set 2026-05-03
#   STRIPE_PRICE_ID_AUDIT/LAUNCH/GROWTH/AUTHORITY/WIELE_OS  (Phase 8.x)
#
# CLIENT-BUNDLED VARS (must live in [vars] below — `NEXT_PUBLIC_*` is
# baked into the client bundle at BUILD TIME; `wrangler secret put` won't
# work for these. Per feedback_deploy_pitfalls.md.)
#
# Updating any [vars] entry requires a fresh `npx wrangler deploy` to
# rebuild the client bundle.

[vars]
# ⚠️  NEXT_PUBLIC_* vars live in `.env.local` (gitignored), NOT here.
# Reason: `next build` only reads .env files + shell env — it does NOT
# auto-inject wrangler.toml [vars] into process.env at build time.
# Putting NEXT_PUBLIC_* here ships an `undefined` value to the client
# bundle, breaking client widgets (Turnstile, Plausible, etc.).
#
# Verified pitfall 2026-05-03 Phase 8.2 — see feedback_deploy_pitfalls.md.
# Server-runtime-only vars (read by Worker at request time) belong here:
WIELE_AI_API_URL = "stub"
